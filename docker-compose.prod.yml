services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: hq_prod
      POSTGRES_USER: hq
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    env_file: .env.prod
    ports:
      - "3003:3003"
    depends_on:
      - postgres
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3003/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  workshop:
    build:
      context: .
      dockerfile: apps/workshop/Dockerfile
    env_file: .env.prod
    ports:
      - "3002:3002"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  postgres_data:
