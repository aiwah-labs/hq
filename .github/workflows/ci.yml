name: CI

on:
  push:
    branches:
      - development
  pull_request:
    branches:
      - development
      - main

jobs:
  ci:
    name: Lint, Type-check, Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: hq_test
          POSTGRES_USER: hq
          POSTGRES_PASSWORD: hq_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://hq:hq_test@localhost:5432/hq_test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Generate Prisma client
        run: pnpm db:generate

      - name: Run DB migrations
        run: pnpm db:migrate:prod

      # Type-check is temporarily disabled until workspace path resolution is fixed (Issue #9)
      # - name: Type-check
      #   run: pnpm typecheck

      - name: Test
        run: pnpm test
